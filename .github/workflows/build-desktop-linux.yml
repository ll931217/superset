name: Build Desktop App (Linux x64)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    name: Build - Linux (x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Generate file icons
        working-directory: apps/desktop
        run: bun run generate:icons

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          SKIP_ENV_VALIDATION: "1"
        run: bun run compile:app

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run package -- --publish never --config electron-builder.ts

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-appimage
          path: apps/desktop/release/*.AppImage
          retention-days: 30
          if-no-files-found: error

      - name: Upload Linux auto-update manifest
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-update-manifest
          path: apps/desktop/release/*-linux.yml
          retention-days: 30
          if-no-files-found: warn
